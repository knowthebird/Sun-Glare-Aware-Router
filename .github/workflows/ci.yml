name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Python checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run Pyright
        run: python -m pyright

      - name: Run tests
        run: python -m pytest
